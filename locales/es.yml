  why:
    collabs: >-
      Colaboramos con instituciones y entidades para desarrollar proyectos
      abiertos de PLN que generen impacto social.
    coming-soon: Próximamente
    community: >-
      Hemos creado la mayor red internacional de hispanohablantes que estudian,
      trabajan e investigan en PLN. ¡Ya somos 2000!
    education: >-
      Organizamos gran variedad de actividades educativas: contamos con +50
      talleres prácticos y charlas de especialistas con 20k visualizaciones y
      hemos diseñado un curso práctico de 0 a 100 con 35k visualizaciones. 
    heading: Somos 600M de hispanohablantes
    job-board: Bolsa de Empleo
    jobs: >-
      Conectamos talento con empresas y grupos de investigación gracias a
      nuestra
    resources: >-
      Impulsamos la creación de bases de datos y modelos open-source en español,
      proporcionando herramientas para la investigación y el desarrollo, y
      recopilando los recursos existentes para mejorar su visibilidad.
    text: >-
      ¡Somos el 7.5% de la población mundial! La investigación en PLN está
      centrada en el inglés y descuida las dificultades particulares de los
      otros idiomas. Vamos a darle a nuestro idioma tan extendido y colorido una
      representación justa en el ámbito del PLN. Nuestra misión es impulsar el
      desarrollo del PLN en español, ¿cómo?
