  heading: SomosNLP
  heading-2: >-
    Somos una comunidad internacional de personas hispanohablantes apasionadas
    por el PLN. Nuestra misión es acercar la IA a 600 millones de personas
    hispanohablantes alrededor del mundo. Y nuestra visión, conseguir una justa
    representación del español y lenguas cooficiales en el mundo digital.
